name: Build Windows Installer

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the .exe to (e.g. v3.5.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}
  APP_NAME: "Marks Amazing Subtitles"
  # Folder name used by the Lua script to locate install_path.txt
  LUA_FOLDER: "MarksAmazingSubs"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AutoSubs-App/src-tauri

      - name: Download FFmpeg binary (Windows x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries

          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "ffmpeg-x86_64-pc-windows-msvc.zip" \
            --clobber

          unzip -jo "ffmpeg-x86_64-pc-windows-msvc.zip"
          rm -f "ffmpeg-x86_64-pc-windows-msvc.zip"

      - name: Install npm dependencies
        run: |
          cd AutoSubs-App
          npm install

      - name: Build Tauri (Windows NSIS installer)
        shell: bash
        run: |
          cd AutoSubs-App
          # Build with no GPU features for now (avoids Vulkan SDK dependency).
          # Transcription runs on CPU (AVX2). DirectML/Vulkan can be re-enabled
          # once the build pipeline is stable.
          npm run tauri build -- -- --no-default-features

      - name: Locate and stage onnxruntime.dll
        # pyannote-rs uses the ort crate (ONNX Runtime) for speaker diarization.
        # ort's copy-dylibs feature copies onnxruntime.dll next to the binary,
        # but only if that feature is enabled by the dependency chain.
        # When copy-dylibs is absent the DLL stays inside the Cargo build OUT_DIR
        # (target/release/build/ort-sys-*/out/...) instead of target/release/.
        # Tauri's NSIS bundler never includes arbitrary DLLs, so we find and
        # stage it here regardless of which location ort chose.
        shell: powershell
        run: |
          $releaseDir = "AutoSubs-App\src-tauri\target\release"

          # 1. copy-dylibs: placed next to the binary
          $dll = Get-Item "$releaseDir\onnxruntime.dll" -ErrorAction SilentlyContinue

          # 2. No copy-dylibs: DLL stays in the Cargo build OUT_DIR
          #    (target/release/build/ort-sys-<hash>/out/ or similar)
          if (-not $dll) {
            Write-Host "Not in release dir, searching Cargo build directory..."
            $dll = Get-ChildItem "$releaseDir\build" -Recurse -Filter "onnxruntime.dll" `
              -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          # 3. ort global download cache (older ort versions used this path)
          if (-not $dll) {
            Write-Host "Not in build dir, searching ort download cache..."
            $dll = Get-ChildItem "$env:LOCALAPPDATA\ort.pyke.io" -Recurse -Filter "onnxruntime.dll" `
              -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          # 4. Last resort: scan the entire target tree
          if (-not $dll) {
            Write-Host "Scanning entire target tree..."
            $dll = Get-ChildItem "AutoSubs-App\src-tauri\target" -Recurse -Filter "onnxruntime.dll" `
              -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if ($dll) {
            Write-Host "Found onnxruntime.dll at: $($dll.FullName)"
            Write-Host "Size: $([math]::Round($dll.Length / 1MB, 1)) MB"
            Copy-Item $dll.FullName "onnxruntime.dll"
          } else {
            Write-Error "onnxruntime.dll not found anywhere in the build tree - the app will not start on Windows"
            exit 1
          }

      - name: Inject install_path.txt into NSIS installer
        # The Lua script (MarksAmazingSubs.lua) reads install_path.txt from
        #   %APPDATA%\...\Scripts\Utility\MarksAmazingSubs\install_path.txt
        # to find the app .exe.  The default Tauri NSIS installer doesn't write
        # this file, so we build a wrapper NSIS installer that:
        #   1. Bundles + runs the original Tauri installer silently
        #   2. Copies onnxruntime.dll into the app directory (required to start)
        #   3. Writes install_path.txt pointing at the per-user install location
        #   4. Copies MarksAmazingSubs.lua into DaVinci Resolve's scripts folder
        #
        # IMPORTANT: All files are bundled at NSIS compile-time via File commands
        # so paths are valid on the end-user's machine (not the CI runner paths).
        #
        # Install path: Tauri 2 NSIS default (no installMode set) is currentUser,
        # which installs to %LOCALAPPDATA%\Programs\<productName>.
        shell: powershell
        run: |
          $nsisDir = "AutoSubs-App\src-tauri\target\release\bundle\nsis"
          $exePath = Get-ChildItem "$nsisDir\*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) { Write-Error "No NSIS exe found"; exit 1 }

          # Stage files that NSIS needs to bundle at compile time
          Copy-Item $exePath "original-setup.exe"
          Copy-Item "AutoSubs-App\src-tauri\resources\MarksAmazingSubs.lua" "MarksAmazingSubs.lua"
          # onnxruntime.dll was staged by the previous step

          $wrapperNsi = @"
          OutFile "MarksAmazingSubs-windows-x86_64-setup.exe"
          RequestExecutionLevel user

          Section
            ; Bundle + extract the Tauri installer so the path is valid on the user's machine
            InitPluginsDir
            SetOutPath "`$PLUGINSDIR"
            File "original-setup.exe"
            ExecWait '"`$PLUGINSDIR\original-setup.exe" /S'

            ; Copy onnxruntime.dll into the app directory.
            ; The app uses ort (ONNX Runtime) for speaker diarization. Without this
            ; DLL the app exits silently at startup with a DLL not found error.
            SetOutPath "`$LOCALAPPDATA\Programs\Marks Amazing Subtitles"
            File "onnxruntime.dll"

            ; Write install_path.txt so the Lua bridge can find the app.
            ; Tauri 2 currentUser NSIS default: %LOCALAPPDATA%\Programs\<productName>
            SetOutPath "`$APPDATA\Blackmagic Design\DaVinci Resolve\Support\Fusion\Scripts\Utility\MarksAmazingSubs"
            FileOpen `$0 install_path.txt w
            FileWrite `$0 "`$LOCALAPPDATA\Programs\Marks Amazing Subtitles"
            FileClose `$0

            ; Copy the Lua entry-point script to Resolve's scripts folder
            SetOutPath "`$APPDATA\Blackmagic Design\DaVinci Resolve\Support\Fusion\Scripts\Utility"
            File "MarksAmazingSubs.lua"
          SectionEnd
          "@
          $wrapperNsi | Out-File -FilePath wrapper.nsi -Encoding utf8
          Write-Host "Wrapper NSIS script created"

      - name: Compile wrapper installer (if NSIS available)
        shell: powershell
        run: |
          # Try to use NSIS if present; fall back to renaming the raw installer
          $nsisBin = "C:\Program Files (x86)\NSIS\makensis.exe"
          $rawExe = (Get-ChildItem "AutoSubs-App\src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1).FullName

          if (Test-Path $nsisBin) {
            & $nsisBin wrapper.nsi
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Wrapper compile failed - falling back to raw installer"
              Copy-Item $rawExe "MarksAmazingSubs-windows-x86_64-setup.exe"
            }
          } else {
            Write-Host "NSIS not found on runner - using raw Tauri installer"
            Copy-Item $rawExe "MarksAmazingSubs-windows-x86_64-setup.exe"
          }

          Write-Host "Final installer: MarksAmazingSubs-windows-x86_64-setup.exe"
          Get-Item "MarksAmazingSubs-windows-x86_64-setup.exe"

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MarksAmazingSubs-windows-x86_64-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.TAG }}
