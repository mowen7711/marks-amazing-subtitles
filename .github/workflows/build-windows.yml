name: Build Windows Installer

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the .exe to (e.g. v3.5.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AutoSubs-App/src-tauri

      - name: Download FFmpeg binary (Windows x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries

          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "ffmpeg-x86_64-pc-windows-msvc.zip" \
            --clobber

          unzip -jo "ffmpeg-x86_64-pc-windows-msvc.zip"
          rm -f "ffmpeg-x86_64-pc-windows-msvc.zip"

      - name: Install npm dependencies
        run: |
          cd AutoSubs-App
          npm install

      - name: Build Tauri (Windows NSIS installer)
        shell: bash
        run: |
          cd AutoSubs-App
          npm run tauri build -- -- --no-default-features --features windows

      - name: Locate and rename installer
        shell: bash
        run: |
          set -euo pipefail
          NSIS_DIR="AutoSubs-App/src-tauri/target/release/bundle/nsis"
          EXE=$(ls -1 "$NSIS_DIR"/*.exe 2>/dev/null | head -n1)
          if [ -z "$EXE" ]; then
            echo "ERROR: No NSIS installer found in $NSIS_DIR"
            exit 1
          fi
          cp "$EXE" "AutoSubs-windows-x86_64-setup.exe"
          echo "Packaged: $EXE → AutoSubs-windows-x86_64-setup.exe"

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoSubs-windows-x86_64-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.TAG }}
