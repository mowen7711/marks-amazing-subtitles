name: Build Windows Installer

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the .exe to (e.g. v3.5.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AutoSubs-App/src-tauri

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.296.0
          install_runtime: true
          cache: true

      - name: Download FFmpeg binary (Windows x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries
          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "ffmpeg-x86_64-pc-windows-msvc.zip" \
            --clobber
          unzip -jo "ffmpeg-x86_64-pc-windows-msvc.zip"
          rm -f "ffmpeg-x86_64-pc-windows-msvc.zip"

      - name: Install npm dependencies
        shell: bash
        run: cd AutoSubs-App && npm install

      - name: Build Tauri (Windows NSIS installer)
        shell: bash
        run: |
          cd AutoSubs-App
          npm run tauri build -- -- --no-default-features --features windows

      - name: Upload installer to GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          nsis_dir="AutoSubs-App/src-tauri/target/release/bundle/nsis"
          exe=$(ls "$nsis_dir"/*.exe | head -1)
          if [ -z "$exe" ]; then
            echo "ERROR: No NSIS installer found in $nsis_dir"
            exit 1
          fi
          echo "Uploading: $exe"
          gh release upload "$TAG" "$exe" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
