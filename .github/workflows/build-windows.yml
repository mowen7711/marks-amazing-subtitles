name: Build Windows Installer

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the .exe to (e.g. v3.5.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AutoSubs-App/src-tauri

      - name: Download FFmpeg binary (Windows x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries
          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "ffmpeg-x86_64-pc-windows-msvc.zip" \
            --clobber
          unzip -jo "ffmpeg-x86_64-pc-windows-msvc.zip"
          rm -f "ffmpeg-x86_64-pc-windows-msvc.zip"

      - name: Install npm dependencies
        shell: bash
        run: cd AutoSubs-App && npm install

      - name: Build Tauri (Windows NSIS installer)
        shell: bash
        run: |
          cd AutoSubs-App
          npm run tauri build -- -- --no-default-features

      - name: Stage files for NSIS wrapper
        shell: bash
        run: |
          set -euo pipefail
          nsis_dir="AutoSubs-App/src-tauri/target/release/bundle/nsis"
          exe=$(ls "$nsis_dir"/*.exe | head -1)
          if [ -z "$exe" ]; then
            echo "ERROR: No NSIS installer found in $nsis_dir"
            exit 1
          fi
          echo "Staging: $exe"
          cp "$exe" original-setup.exe
          cp AutoSubs-App/src-tauri/resources/MarksAmazingSubs.lua MarksAmazingSubs.lua

          echo "Downloading VC++ 2015-2022 redistributable..."
          curl -sSL "https://aka.ms/vs/17/release/vc_redist.x64.exe" -o vc_redist.x64.exe
          echo "vc_redist.x64.exe size: $(wc -c < vc_redist.x64.exe) bytes"

      - name: Write NSIS wrapper script
        shell: bash
        run: |
          cat > wrapper.nsi << 'NSIS_END'
OutFile "MarksAmazingSubs-windows-x86_64-setup.exe"
RequestExecutionLevel user

Section
  InitPluginsDir
  SetOutPath "$PLUGINSDIR"

  ; Install VC++ 2015-2022 redistributable (required by the app)
  File "vc_redist.x64.exe"
  ExecWait '"$PLUGINSDIR\vc_redist.x64.exe" /install /quiet /norestart'

  ; Run the Tauri installer silently
  File "original-setup.exe"
  ExecWait '"$PLUGINSDIR\original-setup.exe" /S'

  ; Write install_path.txt so the Lua bridge can find the app.
  ; Tauri 2 per-user default: %LOCALAPPDATA%\Programs\<productName>
  SetOutPath "$APPDATA\Blackmagic Design\DaVinci Resolve\Support\Fusion\Scripts\Utility\MarksAmazingSubs"
  FileOpen $0 install_path.txt w
  FileWrite $0 "$LOCALAPPDATA\Programs\Marks Amazing Subtitles"
  FileClose $0

  ; Install the Lua entry-point script into DaVinci Resolve's scripts folder
  SetOutPath "$APPDATA\Blackmagic Design\DaVinci Resolve\Support\Fusion\Scripts\Utility"
  File "MarksAmazingSubs.lua"
SectionEnd
NSIS_END

      - name: Compile NSIS wrapper
        shell: bash
        run: |
          set -euo pipefail
          # Tauri downloads its own NSIS during the build — find and reuse it
          makensis=$(find "$LOCALAPPDATA/tauri" -name "makensis.exe" 2>/dev/null | head -1)
          if [ -z "$makensis" ]; then
            echo "ERROR: makensis.exe not found under $LOCALAPPDATA/tauri"
            echo "Contents of $LOCALAPPDATA/tauri:"
            ls -R "$LOCALAPPDATA/tauri" || true
            exit 1
          fi
          echo "Using makensis: $makensis"
          "$makensis" wrapper.nsi

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MarksAmazingSubs-windows-x86_64-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.TAG }}
