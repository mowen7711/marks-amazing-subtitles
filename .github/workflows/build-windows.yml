name: Build Windows Installer

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the .exe to (e.g. v3.5.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}
  APP_NAME: "Marks Amazing Subtitles"
  # Folder name used by the Lua script to locate install_path.txt
  LUA_FOLDER: "MarksAmazingSubs"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: AutoSubs-App/src-tauri

      - name: Download FFmpeg binary (Windows x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd AutoSubs-App/src-tauri
          mkdir -p binaries
          cd binaries

          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "ffmpeg-x86_64-pc-windows-msvc.zip" \
            --clobber

          unzip -jo "ffmpeg-x86_64-pc-windows-msvc.zip"
          rm -f "ffmpeg-x86_64-pc-windows-msvc.zip"

      - name: Install npm dependencies
        run: |
          cd AutoSubs-App
          npm install

      - name: Build Tauri (Windows NSIS installer)
        shell: bash
        run: |
          cd AutoSubs-App
          # Build with no GPU features for now (avoids Vulkan SDK dependency).
          # Transcription runs on CPU (AVX2). DirectML/Vulkan can be re-enabled
          # once the build pipeline is stable.
          npm run tauri build -- -- --no-default-features

      - name: Inject install_path.txt into NSIS installer
        # The Lua script (MarksAmazingSubs.lua) reads install_path.txt from
        #   %APPDATA%\...\Scripts\Utility\MarksAmazingSubs\install_path.txt
        # to find the app .exe.  The default Tauri NSIS installer doesn't write
        # this file, so we build a wrapper NSIS installer that:
        #   1. Bundles + runs the original Tauri installer silently
        #   2. Writes install_path.txt pointing at the per-user install location
        #   3. Copies MarksAmazingSubs.lua into DaVinci Resolve's scripts folder
        #
        # IMPORTANT: The original installer is bundled at NSIS compile-time via the
        # File command.  ExecWait then runs it from $PLUGINSDIR so the path is valid
        # on the end-user's machine (not the CI runner absolute path).
        #
        # Install path: Tauri 2 NSIS default (no installMode set) is currentUser,
        # which installs to %LOCALAPPDATA%\Programs\<productName>.
        shell: powershell
        run: |
          $nsisDir = "AutoSubs-App\src-tauri\target\release\bundle\nsis"
          $exePath = Get-ChildItem "$nsisDir\*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) { Write-Error "No NSIS exe found"; exit 1 }

          # Stage files that NSIS needs to bundle at compile time
          Copy-Item $exePath "original-setup.exe"
          Copy-Item "AutoSubs-App\src-tauri\resources\MarksAmazingSubs.lua" "MarksAmazingSubs.lua"

          $wrapperNsi = @"
          OutFile "MarksAmazingSubs-windows-x86_64-setup.exe"
          RequestExecutionLevel user

          Section
            ; Bundle + extract the Tauri installer so the path is valid on the user's machine
            InitPluginsDir
            SetOutPath "`$PLUGINSDIR"
            File "original-setup.exe"
            ExecWait '"`$PLUGINSDIR\original-setup.exe" /S'

            ; Write install_path.txt so the Lua bridge can find the app.
            ; Tauri 2 currentUser NSIS default: %LOCALAPPDATA%\Programs\<productName>
            SetOutPath "`$APPDATA\Blackmagic Design\DaVinci Resolve\Support\Fusion\Scripts\Utility\MarksAmazingSubs"
            FileOpen `$0 install_path.txt w
            FileWrite `$0 "`$LOCALAPPDATA\Programs\Marks Amazing Subtitles"
            FileClose `$0

            ; Copy the Lua entry-point script to Resolve's scripts folder
            SetOutPath "`$APPDATA\Blackmagic Design\DaVinci Resolve\Support\Fusion\Scripts\Utility"
            File "MarksAmazingSubs.lua"
          SectionEnd
          "@
          $wrapperNsi | Out-File -FilePath wrapper.nsi -Encoding utf8
          Write-Host "Wrapper NSIS script created"

      - name: Compile wrapper installer (if NSIS available)
        shell: powershell
        run: |
          # Try to use NSIS if present; fall back to renaming the raw installer
          $nsisBin = "C:\Program Files (x86)\NSIS\makensis.exe"
          $rawExe = (Get-ChildItem "AutoSubs-App\src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1).FullName

          if (Test-Path $nsisBin) {
            & $nsisBin wrapper.nsi
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Wrapper compile failed - falling back to raw installer"
              Copy-Item $rawExe "MarksAmazingSubs-windows-x86_64-setup.exe"
            }
          } else {
            Write-Host "NSIS not found on runner - using raw Tauri installer"
            Copy-Item $rawExe "MarksAmazingSubs-windows-x86_64-setup.exe"
          }

          Write-Host "Final installer: MarksAmazingSubs-windows-x86_64-setup.exe"
          Get-Item "MarksAmazingSubs-windows-x86_64-setup.exe"

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MarksAmazingSubs-windows-x86_64-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.TAG }}
